<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body align="center">
    <h1>New Account Sign-up</h1>
    <form action="./login_page.html">
        <label for="uname">Enter Username</label>
        <input type="text" id="uname" placeholder="Enter Username"><br><br>
        <label for="fname">Enter First Name</label>
        <input type="text" id="fname" placeholder="Enter First Name"><br><br>
        <label for="lname">Enter Last Name</label>
        <input type="text" id="lname" placeholder="Enter Last Name"><br><br>
        <label for="mnum">Enter Mobile Number</label>
        <input type="tel" id="mnum" placeholder="Enter Mobile Number"><br><br>
        <label for="otp">OTP</label>
        <input type="tel" id="otp" placeholder="OTP"><br><br>
        <label for="email">Enter Email</label>
        <input type="text" id="email" placeholder="Enter Email"><br><br>
        <label for="otp1">OTP</label>
        <input type="tel" id="otp1" placeholder="OTP"><br><br>
        <label for="epass">Enter Password</label>
        <input type="password" id="epass" placeholder="Enter Password"><br><br>
        <label for="cpass">Confirm Password</label>
        <input type="password" id="cpass" placeholder="Enter Password"><br><br>
        <button>Sign-up</button>
    </form>
</body>
</html>
